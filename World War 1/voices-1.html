<!-- Civil War/media-1.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Civil War Media</title>

  <style>
    .content-wrapper {
      max-width: 1400px;
      margin: 0 auto;
      padding: 15px;
      color: black;
      font-family: sans-serif;
      font-size: 28px;
    }

    .profile-layout {
      display: flex;
      align-items: flex-start;
      gap: 20px;
    }

    img.with-border {
      border: 6px solid black;
      border-radius: 6px;
      filter: sepia(0.20) brightness(1.0) contrast(1)
        drop-shadow(0 0 10px rgba(255, 220, 100, 0.15));
      flex-shrink: 0;
    }

    .bio-text { flex: 1; }

    /* ✅ Center the image left-to-right */
    .photo img {
      display: block;
      margin: 0 auto;
      max-width: 400px;
      width: auto;  
	  height: auto;
      max-height: 700px;   /* ✅ cap height */
    }

    .photo { margin-top: 20px; }
  </style>
</head>

<body>
  <div class="content-wrapper">
    <div class="profile-layout">
      <div class="bio-text">
        <h1>The 32nd Division&nbsp;</h1>
      </div>
    </div>

    <figure class="photo">
      <img
        src="/World War 1/Pictures/32nd Div Symbol.jpg"
        alt="32nd Division symbol"
      />
    </figure>
  </div>
</body>
</html>
