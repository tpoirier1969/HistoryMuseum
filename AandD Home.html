<!-- Version 4.10 (Buttons spaced, deep-link to Media-1) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AandD Home</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-image: url('images/background%20images/home/New%20Home%20Background.png');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center center;
      background-attachment: fixed;
      overflow: hidden;
      position: relative;
      font-family: Arial, sans-serif;
    }

    table {
      width: 1867px;
      height: 962px;
      border: 2px solid transparent;
      margin: 0;
      padding: 0;
    }

    td {
      text-align: center;
      vertical-align: middle;
    }

    .glow-animated {
      animation: glowPulse 4s infinite;
      transition: filter 0.3s ease;
    }

    @keyframes glowPulse {
      0% { filter: drop-shadow(0 0 5px rgba(255, 255, 0, 0.3)); }
      50% { filter: drop-shadow(0 0 20px rgba(255, 255, 0, 0.8)); }
      100% { filter: drop-shadow(0 0 5px rgba(255, 255, 0, 0.3)); }
    }

    .glitch-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      background-image: url('images/background%20images/home/New%20Home%20Background.png');
      background-size: cover;
      background-position: center center;
      opacity: 0;
      z-index: 1000;
    }

    body.glitch-active .glitch-overlay {
      opacity: 0.15;
      animation: glitchOverlay 0.5s infinite;
    }

    /* was invalid CSS placed here; keep for reference only
       localStorage.setItem("audio-enabled", "true");
    */

    @keyframes glitchOverlay {
      0%   { transform: translateX(-10px) scaleX(1.05); filter: hue-rotate(0deg); }
      25%  { transform: translateX(10px) scaleX(1.1);  filter: hue-rotate(45deg); }
      50%  { transform: translateX(-10px) scaleX(0.95); filter: hue-rotate(90deg); }
      75%  { transform: translateX(10px) scaleX(1.0);  filter: hue-rotate(135deg); }
      100% { transform: translateX(0)     scaleX(1.0);  filter: hue-rotate(180deg); }
    }

    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 2000;
      background-image: repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0.15),
        rgba(0,0,0,0.15) 1px,
        transparent 1px,
        transparent 2px
      );
      mix-blend-mode: multiply;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    body.glitch-active .scanlines { opacity: 1; }

    .noise-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: url('images/giphy-1.gif');
      background-size: cover;
      pointer-events: none;
      z-index: 1999;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    body.glitch-active .noise-overlay { opacity: 0.05; }

    body.glitch-active table img { animation: buttonGlitch 1s infinite; }

    @keyframes buttonGlitch {
      0%, 100% { transform: translate(0, 0); }
      25%      { transform: translate(1px, -1px); }
      50%      { transform: translate(-1px, 0.5px); }
      75%      { transform: translate(0.5px, 1px); }
    }

    #enable-audio-button {
      position: fixed;
      bottom: 20px;
      left: 20px;
      padding: 10px 20px;
      font-size: 16px;
      background-color: rgba(255, 90, 0, 0.8);
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      z-index: 3000;
    }

    /* --- KIOSK SAFE OVERRIDES: disable motion globally (non-destructive) --- */
    .glow-animated { animation: none !important; transition: none !important; filter: none !important; }
    body.glitch-active .glitch-overlay,
    body.glitch-active .noise-overlay,
    body.glitch-active .scanlines { opacity: 0 !important; animation: none !important; }
    table img { animation: none !important; }
  </style>
</head>
<body>
  <table border="0" align="left" cellpadding="1" cellspacing="1">
    <tbody>

          </a>
        </td>
        <td>
          <a href="arrivals%20and%20departures.html?war=cold&amp;section=media&amp;index=0">
            <img src="images/background images/home/button-cold.png" width="170" height="190" alt="Cold War" class="glow-animated"/>
          </a>

    </tbody>

  <div class="glitch-overlay"></div>
