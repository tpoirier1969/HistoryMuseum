<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Civil War Media</title>
  <style>
    .content-wrapper {
      max-width: 1400px;
      margin: 0 auto;
      padding: 15px;
      color: black;
      font-family: sans-serif;
      font-size: 28px;
    }

.profile-layout {
  display: flex;
  align-items: flex-start; /* Corrected value */
  gap: 20px;
}

img.with-border {
  border: 6px solid black;
  border-radius: 6px;
  filter: sepia(0.20) brightness(1.0) contrast(1) drop-shadow(0 0 10px rgba(255, 220, 100, 0.15));
  flex-shrink: 0;
}

.bio-text {
  flex: 1;
}

/* 🔥 This is what aligns the top of the text block with the image */
.bio-text > *:first-child {
  margin-top: 0;
}
	  
  </style>
	
	
</head>
<body>
  <div class="content-wrapper">
    <div class="profile-layout">
      <img src="../Civil War/Pics/Burt Brothers Block.jpg"  class="with-border responsive" width="600" alt="civil war dead"/>
      <div class="bio-text">
    <h1>Life at Home</h1>
    <p>
      Burt Brothers Block, which burned in the fire of 1868, resided on South Front.
While the price of goods rose during the Civil War, wages did not. Transportation costs were still high and included almost everything (from cattle, flour to apples and fabric).</p>
	  <p><italic>Burt Brothers Block</italic></p>

  </div>
</body>
</html>
