<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Civil War Media 2</title>
  <style>
.content-wrapper {
  max-width: 1400px;
  margin: 0 auto;
  padding: 15px;
  color: black;
  font-family: sans-serif;
  font-size: 28px;
}

.profile-layout {
  display: flex;
  align-items: flex-start;
  gap: 20px;
}

img.with-border {
  vertical-align: top;
  border: 6px solid black;
  border-radius: 6px;
  filter: sepia(0.20) brightness(1.0) contrast(1) drop-shadow(0 0 10px rgba(255, 220, 100, 0.15));
  flex-shrink: 0;
}

.bio-text {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  margin-top: 0;
  padding-top: 0;
}

.bio-text h1 {
  margin-top: 0;
  padding-top: 0;
  line-height: 1.05;
}
	  
  </style>
</head>
<body>
  <div class="content-wrapper">
    <div class="profile-layout">
      <img src="../Civil War/Pics/recruiting.jpg" class="with-border" alt="recruiting"/>
 <div class="bio-text">
  <h1>Recruitment</h1>
  <p><strong>August 15, 1862</strong></p>
  <p>This weekly paper reports several times throughout the war when Captains Moody and Truckey returned to recruit new volunteers. <br>
    <br>
    A total of 1,175 men served from the Upper Peninsula.</p>
</div>

  </div>

</body>
</html>
