    <div class="bio-text">
      <h1>Direct News from Santiago.&nbsp;&nbsp;</h1>
      <p>Many home friends of the boys at the front were gladdened yesterday by the receipt of letters.&nbsp; Most of the eipstles indicate that paper is a scarce article at Santiago.&nbsp; A letter from Stewart Zyrd, received by his sister, was written on an Arbuckle coffee label.&nbsp; One from Joe Shepard to his mother was written on the back of a letter received from home and sent in an envelope turned inside out.&nbsp; Both write in cheerful vein.</p>
      <p>John Thoney has received the following letter from his son, Corporal Joe Thoney, now in Cuba with Company L.&nbsp; The letter is dated at Santiago July 11 and reads as follows:</p>
      <em></3m><p>"We are well located here about two miles from Sntiago.&nbsp; If you were here you could hear them bombarding the city.</p>
      <p>We&nbsp; left Camp Alger June 22 and marched to Dunn Luring, where we took a train for Alexandria, Va., and boarded the steamer Norfolk, and steamed down the Potomac to Old Point Comfort, where we rested and visited the many historic points of interest around the fort.</p>
      <p>We boarded the Tale June 23 and started on our present trip to Santiago.&nbsp; The trip was void of anything of interest.</p>
      <p>I took care of a sick man on the way down and got a chance to get something to eat.&nbsp; The boys could not get anything for days at a time.&nbsp; The treatment on board the boat was rotten.</p>
      <p>We finally landed at a place called Siboney on June 27, and I had the 'pleasure' of...&nbsp;&nbsp;</p></em>
    </div>
  </div>
</div>
