      <h1>She Arrives at Montauk</h1>
      <p> Misss Robinson on theGround Where Company L. Boys are probably now encamped</p>
      <p>MOST FOD FORSAKEN PLACE SHE EVER SAW.</p>
      <p>Company Was Just Disembarking When She Wrote</p>
      <p>&nbsp;Mrs. Wilson writes describing the boys in hospital of Boston</p>
      <p>ALL THE BOYS WERE NOT THERE YET.</p>
      <p>Captain J.E. Ball received yesterday a letter from Miss Robinson, the nurse who was sent down to Montauke point by the relief societies of Marquette to do what she could do personally for Co. L and to spend the money given her to the best advantage of the boys.</p>
      <p>The letter, which was written Aug. 25 reads as follows:</p>
      <em><p>"To Captain Ball - I arrived here today after starting Mrs. Wilson to Boston. Such a God forsaked place I never saw.</p>
      <p>A railway comes into Montauk, but there are no houses within fifteen miles. East Hampton is the nearest place.&nbsp; Some people come and go from New York every day.&nbsp; They come in at noon and return 7:50 PM.&nbsp; It is three and one half hours from New York.</p>
