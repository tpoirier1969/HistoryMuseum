<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Role of Upper Michigan</title>
  <style>
    .content-wrapper {
      max-width: 1400px;
      margin: 0 auto;
      padding: 15px;
      color: black;
      font-family: sans-serif;
      font-size: 28px;
      box-sizing: border-box;
    }

    /* Two columns: left image, right stacked content */
    .layout {
      display: grid;
      grid-template-columns: auto 1fr; /* left sizes to image; right takes the rest */
      gap: 20px;
      align-items: start;
    }

    /* Right column stacks: text → image → caption */
    .right-col {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Shared image frame */
    img.with-border {
      border: 6px solid black;
      border-radius: 6px;
      filter: sepia(0.20) brightness(1.0) contrast(1)
              drop-shadow(0 0 10px rgba(255, 220, 100, 0.15));
      display: block;
      height: auto;
      box-sizing: border-box;
      flex-shrink: 0;
    }

    /* Figure + caption for the second image */
    figure.image-block { margin: 0; display: flex; flex-direction: column; align-items: flex-start; }
    .caption {
      margin-top: 8px;
      font-size: 22px;
      line-height: 1.25;
      color: #333;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    /* Optional: reduce to single column on very narrow screens */
    @media (max-width: 700px){
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="content-wrapper">

    <div class="layout">
      <!-- LEFT: first image only -->
      <img
        src="/Spanish-American/photos/Clara-lambert letter.jpg"
        class="with-border responsive" width="575 px"
        alt="Clara Lambert letter">

      <!-- RIGHT: text → second image → caption -->
      <div class="right-col">
        <div class="text-block">
          <h1>Clara’s Story, continued 2/3</h1>
			<p>Clara Lambert wrote countless letters trying to prove her husband’s case.</p>

        <figure class="image-block">
          <img
            src="/Spanish-American/photos/Lambert - Joeseph copy.jpg"
            class="with-border responsive"
            alt="Joseph Lambert">
          <figcaption class="caption">
            <br><br><em>
              Letter – Clara Lambert request affidavit on behalf of husband<br>
              Date May 17, 1922<br>
              To: Dr. Gilles Leblanc<br>
              From: Clara Lambert
            </em>
          </figcaption>
        </figure>
      </div>
    </div>

  </div>
</body>
</html>
