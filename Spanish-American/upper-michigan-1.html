<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Role of Upper Michigan</title>
  <style>
    .content-wrapper {
      max-width: 1400px;
      margin: 0 auto; 
      padding: 15px;
      color: black;
      font-family: sans-serif;
      font-size: 28px;
    }
	  /* remove default figure margins so images/text align at the top */
  figure.image-block { margin: 0; }
  /* optional: keep the row’s children aligned on their top edges */
  .image-row { align-items: flex-start; }

.profile-layout {
  display: flex;
  align-items: flex-start; /* Corrected value */
  gap: 20px;
}

img.with-border {
  border: 6px solid black;
  border-radius: 6px;
  filter: sepia(0.20) brightness(1.0) contrast(1) drop-shadow(0 0 10px rgba(255, 220, 100, 0.15));
  flex-shrink: 0;
}

.bio-text {
  flex: 1;
}

/* 🔥 This is what aligns the top of the text block with the image */
.bio-text > *:first-child {
  margin-top: 0;
}
	  
  </style>
</head>
<body>
<div class="content-wrapper">
  <div class="profile-layout">
<figure class="image-block" style="margin:0">
    <div class="bio-text">
      <h1>Mining and the Spanish American War</h1>
      <!-- Add any intro text here if needed -->
    </div>
    <div class="bio-text">
      <p> The short duration of the war did not demand an increase in iron ore and copper production. There were also no fears than an enemy might sabotage shipping in Lake Superior.<br>
      </p>
    </div>
  </div>
</div>
</body>
</html>
