<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Civil War Media</title>
  <style>
    .content-wrapper {
      max-width: 1400px;
      margin: 0 auto;
      padding: 15px;
      color: black;
      font-family: sans-serif;
      font-size: 28px;
    }
	  /* remove default figure margins so images/text align at the top */
  figure.image-block { margin: 0; }
  /* optional: keep the row’s children aligned on their top edges */
  .image-row { align-items: flex-start; }

.profile-layout {
  display: flex;
  align-items: flex-start; /* Corrected value */
  gap: 20px;
}

img.with-border {
  border: 6px solid black;
  border-radius: 6px;
  filter: sepia(0.20) brightness(1.0) contrast(1) drop-shadow(0 0 10px rgba(255, 220, 100, 0.15));
  flex-shrink: 0;
}

.bio-text {
  flex: 1;
}

/* 🔥 This is what aligns the top of the text block with the image */
.bio-text > *:first-child {
  margin-top: 0;
}
	  
  </style>
</head>
<body>
<div class="content-wrapper">
  <div class="profile-layout">
    <img src="/Spanish-American/photos/Letter-vandenboom-white.jpg" class="with-border responsive" alt="War Meeting" style="margin-top: 0;" />
    <figure class="image-block" style="margin:0">

    <div class="bio-text">
      <h1>Peter Vandenboom</h1>
      <p>
Peter was one of the first recruits for Company L, 34th Regiment Michigan Infantry.  The Daily Mining Journal reported that the Company was camped at the foot of San Juan Hill in August of 1898. The article goes on to say that there is “more malaria there than on the hill. The commander of “L” reported that 197 men were sick in his company and 120 in other battalion of 800 men. Scores of men were so weak that they were unable to walk unassisted or even stand up.” Peter Vandenboom died on August 6, 1898 at the age of 18.
      </p>
    </div>
  </div>
</div>
</body>
</html>
