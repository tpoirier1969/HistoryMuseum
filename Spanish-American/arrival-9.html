					 <br> COMPLETE RECORD OF THE COMPANY
					  <br> Captain Samuel Wheeler, in Detroit.<br>
					  First Lieutenant John S. Wilson, in hospital in Boston.<br>Seconed Lieutenant James A. Leisen, in Menominee on furlough.<br>Peter Vandenboom, Marquette; died in Cuba.<br>Joe Berry, Marquette; died in Cuba.<br>Robert M'Killup, Marquette; died at sea during return voyage to United States; buried in midocean.  Was known as "Scotty."<br>Ed Mayotte, Negaunee; died in Cub.<br>Olaf Husby, Ishpeming; died in Cuba.<br>George Martin, Escanaba; died in Cuba.<br>Joseph A. Thoney, Marquette; returned with Company.<br>Fred B. Elliott, Marquette; returned with Company.<br>Peter Grant, Jr., Marquette; returned with Company.<br>John Flynn, Jr., Marquette; returned with Company.
