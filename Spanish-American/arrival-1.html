<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Civil War Media</title>
  <style>
    .content-wrapper {
      max-width: 1400px;
      margin: 0 auto;
      padding: 15px;
      color: black;
      font-family: sans-serif;
      font-size: 28px;
    }

    .profile-layout {
      display: flex;
      align-items: flex-start;
      gap: 20px;
    }

    img.with-border {
      border: 6px solid black;
      border-radius: 6px;
      filter: sepia(0.20) brightness(1.0) contrast(1) drop-shadow(0 0 10px rgba(255, 220, 100, 0.15));
      flex-shrink: 0;
    }

    .bio-text {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="content-wrapper">
    <div class="profile-layout">
     <div class="content-wrapper">
  <div class="profile-layout">
    <img src="/Spanish-American/photos/14-marquette-parade copy.jpg" class="with-border responsive" alt="War Meeting" style="margin-top: 0;" />
    <figure class="image-block" style="margin:0"> 
		<div class="bio-text">
        <h1>Gala Parade</h1>
        <p>
          Throngs of people turned out in the cities of the Upper Peninsula to welcome veterans home. The brief and successful war made citizens proud of their hometown boys who served in the war.
        </p>
    </div>
    </div>
  </div>
</body>
</html>
