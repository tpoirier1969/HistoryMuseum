      <h1> Clara's Story, continued 3/3</h1>

<p>Affidavit – stating financial status of Clara M. Lambert<br>
Date June 24, 1921<br>
To: Widow’s Division<br>
From: Father Jodacy Pastor of St. John’s Church <br>
and Alice M. La Londe, Marquette<br>
<br>
Excerpt: <em>"That Clara has no real or personal property of value. Except sum of one thousand dollars death benefit from Knights of Columbus, was required to pay over two hundred dollars of debt from this money, no fixed income, keeps boarders which she receives fifteen dollars monthly. With this income she supports herself and three children. Has no income for clothes for herself and children."</p></em>
