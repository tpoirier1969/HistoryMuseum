      <div class="bio-text">
      <h1> Veterans Organizations</h1>

<p>Soon after the war ended, discharged veterans quickly formed fraternal societies. At the turn of the century many of these societies merged. The three largest groups, the Spanish War Veterans, the Spanish American War Veterans and the Servicemen of the Spanish War formed the United Spanish War Veterans. Eventually this organization included soldiers who had served in the Philippine American War as well.</p>
    </div>
		          <figcaption class="caption">
